query RunInput {
  cart {
    attribute(key: "spt_asgn") {
      value
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        ... on ProductVariant {
          id
          product {
            id
            handle
          }
        }
      }
    }
  }
  cartTransform {
    metafield(namespace: "split_test_app", key: "cart_transform_config") {
      value
    }
  }
}
