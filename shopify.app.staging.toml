# Staging app — Arktic split-test beta
# Deploy: shopify app deploy --config shopify.app.staging.toml

client_id = "01bfe62b2cca666a06343ce82a922531"
name = "Arktic Split test beta 2.0"
application_url = "https://staging.arkticstudio.com"
embedded = false

[build]
automatically_update_urls_on_dev = true
dev_command = "npx react-router dev"
build_command = "npx react-router build"

[access_scopes]
scopes = "read_products,write_products,read_themes,write_themes,read_orders,write_discounts,write_cart_transforms"

[auth]
redirect_urls = [
  "https://amused-bravery-staging.up.railway.app/auth/callback",
  "https://amused-bravery-staging.up.railway.app/auth/shopify/callback",
  "https://amused-bravery-staging.up.railway.app/api/auth/callback",
  "https://staging.arkticstudio.com/auth/callback",
  "https://staging.arkticstudio.com/auth/shopify/callback",
  "https://staging.arkticstudio.com/api/auth/callback",
]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["shop/update"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["themes/create", "themes/update", "themes/delete"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["app_subscriptions/update"]
  uri = "/webhooks"

  # orders/create, orders/paid, orders/cancelled, orders/updated require protected
  # customer data approval — add back once staging app is approved in Partner Dashboard

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/webhooks"

[pos]
embedded = false
